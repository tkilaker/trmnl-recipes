watch:
  - src/**/*.liquid
  - src/settings.yml
  - src/transform.js

custom_fields:
  news_count: 8

time_zone: Europe/Stockholm

# By default trmnlp serve uses the cache populated by `bin/poll-real sydsvenskan-news`.
# To preview offline (no network), uncomment the block below — `variables`
# deep-merges on top of the cache and wins for any keys it sets.
#
# variables:
#   items:
#     - title: "Exempel: en nyhet"
#       description: "Beskrivning i två rader."
#       pubDate: "Thu, 15 May 2026 21:50:00 +0200"
